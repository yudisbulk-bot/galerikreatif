<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎨 Galeri Kreatif</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
    body { background:#f5f3f0; padding:16px; }
    .container { max-width:700px; margin:0 auto; }
    .header { text-align:center; padding:20px 0 10px; }
    .header h1 { font-size:32px; font-weight:800; }
    .badge { background:#1a1a1a; color:#fff; padding:6px 16px; border-radius:40px; font-size:12px; display:inline-block; margin-top:6px; }
    .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:16px; margin-top:20px; }
    .card { background:#fff; border-radius:20px; overflow:hidden; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .card:active { transform:scale(0.97); }
    .card img { width:100%; height:170px; object-fit:cover; display:block; background:#eee; }
    .card .title { padding:12px 14px; font-weight:700; font-size:14px; }
    .empty { text-align:center; padding:60px 20px; color:#bbb; grid-column:1/-1; }
    .empty span { font-size:48px; display:block; margin-bottom:12px; }
    .loading { text-align:center; padding:40px; color:#999; grid-column:1/-1; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); display:none; justify-content:center; align-items:center; padding:20px; z-index:1000; }
    .modal.active { display:flex; }
    .modal-box { background:#fff; border-radius:28px; max-width:480px; width:100%; max-height:90vh; overflow-y:auto; padding:0; }
    .modal-box img { width:100%; height:auto; max-height:50vh; object-fit:contain; border-radius:28px 28px 0 0; background:#eee; }
    .modal-content { padding:24px; }
    .modal-content h2 { font-size:22px; margin-bottom:8px; }
    .modal-content .desc { background:#f5f3f0; padding:14px 16px; border-radius:14px; white-space:pre-wrap; }
    .modal-close { display:block; width:100%; padding:14px; margin-top:16px; background:#1a1a1a; color:#fff; border:none; border-radius:40px; font-weight:600; cursor:pointer; }
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:12px 28px; border-radius:40px; font-size:14px; opacity:0; transition:0.3s; pointer-events:none; z-index:999; }
    .toast.show { opacity:1; }
    .footer { text-align:center; color:#ccc; margin-top:40px; font-size:13px; }
    .footer a { color:#888; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🎨 Galeri Kreatif</h1>
    <p>Lihat & bagikan karya</p>
    <div class="badge">🔥 Firebase</div>
  </div>
  <div id="gallery" class="gallery"><div class="loading">⏳ Memuat...</div></div>
  <div class="footer">
    <a href="admin.html">🔐 Buka Admin</a>
  </div>
</div>

<div class="modal" id="detailModal">
  <div class="modal-box">
    <img id="modalImage" src="">
    <div class="modal-content">
      <h2 id="modalTitle">Judul</h2>
      <div class="desc" id="modalDesc">Deskripsi</div>
      <button class="modal-close" id="closeModal">Tutup</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">✅</div>

<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js"
  }
}
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyCrhghmAhtTijVNLKw5izsa-7TVCRzd2L4",
    authDomain: "galeri-kreatif.firebaseapp.com",
    projectId: "galeri-kreatif",
    storageBucket: "galeri-kreatif.firebasestorage.app",
    messagingSenderId: "436229179023",
    appId: "1:436229179023:web:78445a449aaf18d30252fa"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  console.log('✅ Firebase siap');

  const galleryEl = document.getElementById('gallery');
  const modal = document.getElementById('detailModal');
  const modalImg = document.getElementById('modalImage');
  const modalTitle = document.getElementById('modalTitle');
  const modalDesc = document.getElementById('modalDesc');
  const closeModal = document.getElementById('closeModal');
  const toast = document.getElementById('toast');

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function listenKarya() {
    console.log('👂 Mendengarkan koleksi karya...');
    const q = query(collection(db, 'karya'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
      const data = [];
      snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
      console.log(`📦 ${data.length} karya diterima`);
      renderGallery(data);
    }, (error) => {
      console.error('❌ Error snapshot:', error);
      galleryEl.innerHTML = `<div class="empty"><span>⚠️</span>${error.message}</div>`;
    });
  }

  function renderGallery(data) {
    if (data.length === 0) {
      galleryEl.innerHTML = `<div class="empty"><span>🖼️</span>Belum ada karya</div>`;
      return;
    }
    let html = '';
    data.forEach((item, i) => {
      html += `
        <div class="card" data-index="${i}">
          <img src="${item.src}" alt="${item.caption}" loading="lazy">
          <div class="title">${item.caption || 'Karya'}</div>
        </div>
      `;
    });
    galleryEl.innerHTML = html;

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        const idx = parseInt(card.dataset.index);
        const item = data[idx];
        showDetail(item);
      });
    });
  }

  function showDetail(item) {
    modalImg.src = item.src;
    modalTitle.textContent = item.caption || 'Karya';
    modalDesc.textContent = item.description || 'Tidak ada deskripsi.';
    modal.classList.add('active');
  }

  closeModal.addEventListener('click', () => modal.classList.remove('active'));
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

  listenKarya();
  console.log('🏁 Aplikasi publik siap');
</script>
</body>
</html>
