<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎨 Galeri Kreatif</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
    body { background:#f8f6f2; padding:16px; min-height:100vh; }
    .container { max-width:700px; margin:0 auto; }
    .header { text-align:center; padding:24px 0 16px; }
    .header h1 { font-size:32px; font-weight:800; color:#1a1a1a; }
    .header p { color:#888; font-size:15px; margin-top:4px; }
    .badge { display:inline-block; background:#1a1a1a; color:white; padding:6px 16px; border-radius:40px; font-size:12px; font-weight:600; margin-top:8px; }
    .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; margin-top:20px; }
    .gallery-card { background:white; border-radius:20px; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,0.06); cursor:pointer; transition:0.25s; border:2px solid transparent; position:relative; }
    .gallery-card:active { transform:scale(0.97); border-color:#1a1a1a; }
    .gallery-card img { width:100%; height:180px; object-fit:cover; display:block; background:#f0ede8; }
    .gallery-card .title { padding:12px 14px 10px; font-weight:700; font-size:15px; color:#1a1a1a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gallery-card .badge-desc { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.7); color:white; padding:4px 12px; border-radius:30px; font-size:11px; }
    .empty { text-align:center; padding:60px 20px; color:#bbb; grid-column:1/-1; }
    .empty span { font-size:48px; display:block; margin-bottom:12px; }
    .loading { text-align:center; padding:40px; color:#999; grid-column:1/-1; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); display:none; justify-content:center; align-items:center; padding:20px; z-index:1000; }
    .modal-overlay.active { display:flex; }
    .modal-box { background:white; border-radius:28px; max-width:480px; width:100%; max-height:90vh; overflow-y:auto; padding:0; box-shadow:0 24px 64px rgba(0,0,0,0.2); }
    .modal-box img { width:100%; height:auto; max-height:50vh; object-fit:contain; background:#f5f3f0; border-radius:28px 28px 0 0; }
    .modal-content { padding:24px; }
    .modal-content h2 { font-size:22px; font-weight:700; margin-bottom:8px; }
    .modal-content .desc { font-size:16px; line-height:1.6; color:#333; background:#f8f6f2; padding:14px 16px; border-radius:14px; margin-top:6px; white-space:pre-wrap; }
    .modal-close { display:block; width:100%; padding:14px; margin-top:16px; background:#1a1a1a; color:white; border:none; border-radius:40px; font-size:16px; font-weight:600; cursor:pointer; }
    .footer { text-align:center; color:#ccc; font-size:13px; margin-top:40px; padding-bottom:10px; }
    .footer a { color:#888; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🎨 Galeri Kreatif</h1>
    <p>Karya dari seluruh dunia</p>
    <div class="badge">🌐 Online • GitHub Gist</div>
  </div>

  <div id="galleryContainer" class="gallery">
    <div class="loading">⏳ Memuat karya...</div>
  </div>

  <div class="footer"><a href="admin.html">🔐 Admin</a> • Data di GitHub</div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <img id="modalImage" src="">
    <div class="modal-content">
      <h2 id="modalTitle">Judul</h2>
      <div class="desc" id="modalDesc">Deskripsi...</div>
      <button class="modal-close" id="closeModalBtn">Tutup</button>
    </div>
  </div>
</div>

<script>
  // ========== KONFIGURASI ==========
  // GANTI DENGAN GIST URL KAMU!
  const GIST_ID = '02fae13ca18208d3f6e9151b2ac7ffbe'; // Ambil dari URL gist
  const GIST_USER = 'yudisbulk-bot'; // Username GitHub kamu

  let galleryData = [];

  // ========== BACA DARI GIST ==========
  async function loadFromGist() {
    try {
      const response = await fetch(
        `https://api.github.com/gists/${GIST_ID}`
      );
      const data = await response.json();
      
      if (data.files && data.files['data.json']) {
        const content = JSON.parse(data.files['data.json'].content);
        galleryData = content.gallery || [];
        renderGallery();
      } else {
        galleryData = [];
        renderGallery();
      }
    } catch (error) {
      console.error('Gagal load:', error);
      document.getElementById('galleryContainer').innerHTML = 
        `<div class="empty"><span>⚠️</span>Gagal memuat data<br><small>Pastikan Gist ID benar</small></div>`;
    }
  }

  // ========== RENDER ==========
  function renderGallery() {
    const container = document.getElementById('galleryContainer');
    if (!galleryData || galleryData.length === 0) {
      container.innerHTML = `<div class="empty"><span>🖼️</span>Belum ada karya<br><small>Admin akan segera mengisi</small></div>`;
      return;
    }

    let html = '';
    galleryData.forEach((item, index) => {
      html += `
        <div class="gallery-card" data-index="${index}">
          <img src="${item.src}" alt="${item.caption}" loading="lazy">
          <div class="title">${item.caption || 'Karya'}</div>
          ${item.description ? '<div class="badge-desc">📖</div>' : ''}
        </div>
      `;
    });
    container.innerHTML = html;

    document.querySelectorAll('.gallery-card').forEach(card => {
      card.addEventListener('click', () => {
        const idx = parseInt(card.dataset.index);
        const item = galleryData[idx];
        document.getElementById('modalImage').src = item.src;
        document.getElementById('modalTitle').textContent = item.caption || 'Karya';
        document.getElementById('modalDesc').textContent = item.description || 'Tidak ada deskripsi.';
        document.getElementById('detailModal').classList.add('active');
        document.body.style.overflow = 'hidden';
      });
    });
  }

  // ========== MODAL ==========
  document.getElementById('closeModalBtn').addEventListener('click', () => {
    document.getElementById('detailModal').classList.remove('active');
    document.body.style.overflow = '';
  });
  document.getElementById('detailModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
      document.getElementById('detailModal').classList.remove('active');
      document.body.style.overflow = '';
    }
  });

  // ========== INIT ==========
  loadFromGist();
  setInterval(loadFromGist, 10000);
</script>
</body>
</html>
