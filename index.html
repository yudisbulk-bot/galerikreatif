<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎨 Galeri Kreatif</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
    body { background:#f5f3f0; padding:16px; }
    .container { max-width:700px; margin:0 auto; }

    /* Header */
    .header { text-align:center; padding:20px 0 10px; }
    .header h1 { font-size:32px; font-weight:800; }
    .badge { background:#1a1a1a; color:#fff; padding:6px 16px; border-radius:40px; font-size:12px; display:inline-block; margin-top:6px; }

    /* Galeri */
    .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:16px; margin-top:20px; }
    .card { background:#fff; border-radius:20px; overflow:hidden; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .card:active { transform:scale(0.97); }
    .card img { width:100%; height:170px; object-fit:cover; display:block; background:#eee; }
    .card .title { padding:12px 14px; font-weight:700; font-size:14px; }
    .empty { text-align:center; padding:60px 20px; color:#bbb; grid-column:1/-1; }
    .empty span { font-size:48px; display:block; margin-bottom:12px; }
    .loading { text-align:center; padding:40px; color:#999; grid-column:1/-1; }

    /* Modal detail */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); display:none; justify-content:center; align-items:center; padding:20px; z-index:1000; }
    .modal.active { display:flex; }
    .modal-box { background:#fff; border-radius:28px; max-width:480px; width:100%; max-height:90vh; overflow-y:auto; padding:0; }
    .modal-box img { width:100%; height:auto; max-height:50vh; object-fit:contain; border-radius:28px 28px 0 0; background:#eee; }
    .modal-content { padding:24px; }
    .modal-content h2 { font-size:22px; margin-bottom:8px; }
    .modal-content .desc { background:#f5f3f0; padding:14px 16px; border-radius:14px; white-space:pre-wrap; }
    .modal-close { display:block; width:100%; padding:14px; margin-top:16px; background:#1a1a1a; color:#fff; border:none; border-radius:40px; font-weight:600; cursor:pointer; }

    /* Toast */
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:12px 28px; border-radius:40px; font-size:14px; opacity:0; transition:0.3s; pointer-events:none; z-index:999; }
    .toast.show { opacity:1; }

    /* Toggle admin */
    .admin-toggle { background:none; border:none; color:#888; font-weight:600; cursor:pointer; font-size:13px; }

    /* Panel admin (tersembunyi) */
    #adminPanel { display:none; margin-top:40px; border-top:2px solid #ddd; padding-top:30px; }
    #adminPanel.active { display:block; }

    /* Gaya admin */
    .section { background:#fff; border-radius:24px; padding:20px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .section h2 { font-size:18px; margin-bottom:14px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    .row input, .row textarea { flex:1; padding:12px 16px; border:2px solid #eee; border-radius:14px; font-size:14px; font-family:inherit; min-width:120px; }
    .row textarea { min-height:60px; resize:vertical; }
    .btn { padding:12px 24px; border:none; border-radius:40px; font-weight:600; cursor:pointer; background:#1a1a1a; color:#fff; }
    .btn:active { transform:scale(0.95); }
    .btn-success { background:#34c759; }
    .btn-danger { background:#ff4d4d; }
    .btn-secondary { background:#f0f0f0; color:#333; }
    .canvas-wrapper { background:#fafafa; border-radius:16px; overflow:hidden; border:2px dashed #ddd; margin-top:8px; }
    #whiteboardCanvas { width:100%; height:auto; aspect-ratio:4/3; display:block; touch-action:none; cursor:crosshair; background:white; }
    .canvas-tools { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .canvas-tools button { padding:10px 16px; border:none; border-radius:40px; font-weight:600; cursor:pointer; flex:1; min-width:60px; }
    .canvas-tools button:active { transform:scale(0.95); }
    .upload-area { display:flex; flex-direction:column; gap:10px; }
    .upload-area input[type="file"] { padding:12px; border:2px dashed #ddd; border-radius:16px; background:#fafafa; }
    .gallery-admin { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-top:16px; }
    .admin-card { background:#fff; border-radius:16px; overflow:hidden; border:2px solid #eee; }
    .admin-card img { width:100%; height:130px; object-fit:cover; display:block; }
    .admin-card .info { padding:10px 12px; font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .admin-card .actions { display:flex; gap:6px; padding:0 12px 12px; }
    .admin-card .actions button { flex:1; padding:6px; border:none; border-radius:30px; font-size:12px; font-weight:600; cursor:pointer; }
    .btn-edit { background:#f0f0f0; }
    .btn-del { background:#ff4d4d; color:#fff; }
    .empty-admin { text-align:center; color:#bbb; padding:30px 0; grid-column:1/-1; }
    .color-row { display:flex; gap:8px; align-items:center; margin-top:10px; }
    .color-row input[type="color"] { width:40px; height:36px; border:none; border-radius:10px; padding:0; }
    .color-row input[type="range"] { flex:1; }
    .progress-bar { width:100%; height:6px; background:#eee; border-radius:4px; margin-top:8px; overflow:hidden; display:none; }
    .progress-bar .fill { height:100%; background:#34c759; width:0%; transition:width 0.3s; }

    /* FAB saran (opsional) */
    .fab-suggest { position:fixed; top:16px; right:16px; z-index:900; background:#1a1a1a; color:#fff; border:none; border-radius:40px; padding:10px 16px; font-weight:700; font-size:13px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
    .fab-suggest:active { transform:scale(0.95); }
    .popup-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); display:none; justify-content:center; align-items:center; padding:20px; z-index:2000; }
    .popup-overlay.active { display:flex; }
    .popup-box { background:#fff; border-radius:24px; max-width:420px; width:100%; padding:24px; max-height:90vh; overflow-y:auto; position:relative; }
    .popup-box h3 { margin-bottom:12px; font-size:18px; }
    .popup-box textarea { width:100%; min-height:100px; padding:12px 14px; border:2px solid #eee; border-radius:14px; font-family:inherit; font-size:14px; resize:vertical; }
    .popup-box .btn { width:100%; margin-top:12px; padding:12px; border:none; border-radius:40px; background:#1a1a1a; color:#fff; font-weight:700; cursor:pointer; }
    .popup-close-x { position:absolute; top:14px; right:16px; background:none; border:none; font-size:20px; cursor:pointer; color:#999; }
  </style>
</head>
<body>

<div class="container">
  <!-- HEADER -->
  <div class="header">
    <h1>🎨 Galeri Kreatif</h1>
    <p>Lihat & bagikan karya</p>
    <div class="badge">🔥 Firebase</div>
  </div>

  <!-- GALERI PUBLIK -->
  <div id="gallery" class="gallery"><div class="loading">⏳ Memuat...</div></div>

  <!-- FOOTER -->
  <div style="text-align:center; margin-top:40px; font-size:13px; color:#ccc;">
    <button class="admin-toggle" id="adminToggleBtn">🔐 Mode Admin</button>
  </div>

  <!-- PANEL ADMIN -->
  <div id="adminPanel">
    <!-- Upload File -->
    <div class="section">
      <h2>📤 Upload Gambar</h2>
      <div class="upload-area">
        <input type="file" id="imageInput" accept="image/*">
        <div class="row">
          <input type="text" id="captionInput" placeholder="Judul">
          <textarea id="descInput" placeholder="Deskripsi"></textarea>
        </div>
        <button class="btn" id="uploadFileBtn">➕ Tambah</button>
        <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
      </div>
    </div>

    <!-- Whiteboard -->
    <div class="section">
      <h2>✏️ Whiteboard</h2>
      <div class="canvas-wrapper">
        <canvas id="whiteboardCanvas" width="600" height="450"></canvas>
      </div>
      <div class="color-row">
        <input type="color" id="brushColor" value="#1a1a1a">
        <input type="range" id="brushSize" min="1" max="30" value="4">
      </div>
      <div class="canvas-tools">
        <button class="btn-success" id="saveDrawingBtn">💾 Simpan</button>
        <button class="btn-danger" id="clearCanvasBtn">🗑️ Hapus</button>
        <button class="btn-secondary" id="undoCanvasBtn">↩️ Undo</button>
      </div>
    </div>

    <!-- Daftar Karya (admin) -->
    <div class="section">
      <h2>📚 Daftar Karya (<span id="count">0</span>)</h2>
      <div id="adminGallery" class="gallery-admin"><div class="empty-admin">Belum ada</div></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast">✅</div>

<!-- Importmap (diperbaiki) -->
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/12.16.0/firebase-storage.js"
  }
}
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, deleteDoc, doc, updateDoc } from "firebase/firestore";
  import { getStorage, ref, uploadString, getDownloadURL } from "firebase/storage";

  // ===== KONFIGURASI FIREBASE =====
  const firebaseConfig = {
    apiKey: "AIzaSyCrhghmAhtTijVNLKw5izsa-7TVCRzd2L4",
    authDomain: "galeri-kreatif.firebaseapp.com",
    projectId: "galeri-kreatif",
    storageBucket: "galeri-kreatif.firebasestorage.app",
    messagingSenderId: "436229179023",
    appId: "1:436229179023:web:78445a449aaf18d30252fa"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);
  console.log('✅ Firebase siap');

  // ===== ELEMEN =====
  const galleryEl = document.getElementById('gallery');
  const adminPanel = document.getElementById('adminPanel');
  const adminToggleBtn = document.getElementById('adminToggleBtn');
  const toast = document.getElementById('toast');

  // ===== TOAST =====
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ===== STATE =====
  let adminActive = false;
  let allKarya = [];        // data dari Firebase
  let unsubscribe = null;

  // ===== GALERI PUBLIK (Realtime) =====
  function listenKarya() {
    console.log('👂 Mendengarkan koleksi karya...');
    if (unsubscribe) unsubscribe();

    const q = query(collection(db, 'karya'), orderBy('createdAt', 'desc'));
    unsubscribe = onSnapshot(q, (snapshot) => {
      const data = [];
      snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
      allKarya = data;
      renderGallery(data);
      renderAdminGallery(data);
      document.getElementById('count').textContent = data.length;
    }, (error) => {
      console.error('❌ Error snapshot:', error);
      galleryEl.innerHTML = `<div class="empty"><span>⚠️</span>${error.message}</div>`;
    });
  }

  function renderGallery(data) {
    if (data.length === 0) {
      galleryEl.innerHTML = `<div class="empty"><span>🖼️</span>Belum ada karya</div>`;
      return;
    }
    let html = '';
    data.forEach((item, i) => {
      html += `
        <div class="card" data-index="${i}">
          <img src="${item.src}" alt="${item.caption}" loading="lazy">
          <div class="title">${item.caption || 'Karya'}</div>
        </div>
      `;
    });
    galleryEl.innerHTML = html;

    // Klik untuk detail
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        const idx = parseInt(card.dataset.index);
        const item = data[idx];
        showDetail(item);
      });
    });
  }

  // ===== MODAL DETAIL =====
  function showDetail(item) {
    // Buat modal secara dinamis (ringkas)
    const modal = document.createElement('div');
    modal.className = 'modal active';
    modal.innerHTML = `
      <div class="modal-box">
        <img src="${item.src}" alt="${item.caption}">
        <div class="modal-content">
          <h2>${item.caption || 'Karya'}</h2>
          <div class="desc">${item.description || 'Tidak ada deskripsi.'}</div>
          <button class="modal-close">Tutup</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    modal.querySelector('.modal-close').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  }

  // ===== ADMIN TOGGLE =====
  adminToggleBtn.addEventListener('click', () => {
    adminActive = !adminActive;
    adminPanel.classList.toggle('active', adminActive);
    adminToggleBtn.textContent = adminActive ? '🔓 Keluar Mode Admin' : '🔐 Mode Admin';
    if (adminActive) {
      // Jika admin aktif, muat ulang data (sudah via listener)
      showToast('✅ Mode admin aktif');
      initCanvas();
    } else {
      showToast('Mode admin nonaktif');
    }
  });

  // ===== UPLOAD GAMBAR (file) =====
  async function uploadToStorage(base64) {
    const path = `karya/${Date.now()}_${Math.random().toString(36).slice(2)}.png`;
    const refStorage = ref(storage, path);
    await uploadString(refStorage, base64, 'data_url');
    return await getDownloadURL(refStorage);
  }

  document.getElementById('uploadFileBtn').addEventListener('click', async () => {
    const fileInput = document.getElementById('imageInput');
    const caption = document.getElementById('captionInput').value.trim() || 'Karya';
    const description = document.getElementById('descInput').value.trim();

    if (!fileInput.files || fileInput.files.length === 0) {
      showToast('⚠️ Pilih gambar');
      return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        showToast('⏳ Upload...');
        const url = await uploadToStorage(e.target.result);
        await addDoc(collection(db, 'karya'), {
          src: url,
          caption,
          description: description || '',
          createdAt: new Date()
        });
        fileInput.value = '';
        document.getElementById('captionInput').value = '';
        document.getElementById('descInput').value = '';
        showToast('✅ Berhasil ditambahkan!');
      } catch (err) {
        showToast('⚠️ Gagal: ' + err.message);
      }
    };
    reader.readAsDataURL(file);
  });

  // ===== WHITEBOARD =====
  const canvas = document.getElementById('whiteboardCanvas');
  const ctx = canvas.getContext('2d');
  let drawingHistory = [];
  let isDrawing = false;
  let lastX = 0, lastY = 0;

  function initCanvas() {
    drawingHistory = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let cx, cy;
    if (e.touches) {
      cx = e.touches[0].clientX;
      cy = e.touches[0].clientY;
      e.preventDefault();
    } else {
      cx = e.clientX;
      cy = e.clientY;
    }
    return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
  }

  function startDraw(e) {
    e.preventDefault();
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
  }

  function draw(e) {
    e.preventDefault();
    if (!isDrawing) return;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = document.getElementById('brushColor').value;
    ctx.lineWidth = document.getElementById('brushSize').value;
    ctx.lineCap = 'round';
    ctx.stroke();
    lastX = pos.x;
    lastY = pos.y;
  }

  function endDraw(e) {
    e.preventDefault();
    if (isDrawing) {
      isDrawing = false;
      drawingHistory.push(canvas.toDataURL());
      if (drawingHistory.length > 30) drawingHistory.shift();
    }
  }

  canvas.addEventListener('pointerdown', (e) => { canvas.setPointerCapture(e.pointerId); startDraw(e); });
  canvas.addEventListener('pointermove', draw);
  canvas.addEventListener('pointerup', endDraw);
  canvas.addEventListener('pointercancel', endDraw);

  document.getElementById('clearCanvasBtn').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawingHistory = [canvas.toDataURL()];
    showToast('🧹 Dibersihkan');
  });

  document.getElementById('undoCanvasBtn').addEventListener('click', () => {
    if (drawingHistory.length > 1) {
      drawingHistory.pop();
      const prev = drawingHistory[drawingHistory.length - 1];
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        showToast('↩️ Undo');
      };
      img.src = prev;
    } else {
      showToast('⚠️ Tidak ada undo');
    }
  });

  // Simpan drawing
  document.getElementById('saveDrawingBtn').addEventListener('click', async () => {
    const dataUrl = canvas.toDataURL();
    const caption = prompt('Judul:', 'Gambar whiteboard');
    if (caption === null) return;
    const desc = prompt('Deskripsi:', '');
    try {
      showToast('⏳ Upload...');
      const url = await uploadToStorage(dataUrl);
      await addDoc(collection(db, 'karya'), {
        src: url,
        caption,
        description: desc || '',
        createdAt: new Date()
      });
      showToast('✅ Berhasil ditambahkan!');
    } catch (err) {
      showToast('⚠️ Gagal: ' + err.message);
    }
  });

  // ===== ADMIN GALLERY (edit & hapus) =====
  function renderAdminGallery(data) {
    const container = document.getElementById('adminGallery');
    if (data.length === 0) {
      container.innerHTML = `<div class="empty-admin">Belum ada karya</div>`;
      return;
    }
    let html = '';
    data.forEach((item, idx) => {
      html += `
        <div class="admin-card">
          <img src="${item.src}" alt="${item.caption}" loading="lazy">
          <div class="info">${item.caption || 'Karya'}</div>
          <div class="actions">
            <button class="btn-edit" data-id="${item.id}">✏️</button>
            <button class="btn-del" data-id="${item.id}">🗑️</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;

    // Edit
    container.querySelectorAll('.btn-edit').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const item = data.find(d => d.id === id);
        if (!item) return;
        const newCap = prompt('Judul baru:', item.caption || '');
        if (newCap === null) return;
        const newDesc = prompt('Deskripsi baru:', item.description || '');
        try {
          await updateDoc(doc(db, 'karya', id), { caption: newCap, description: newDesc || '' });
          showToast('✅ Diperbarui');
        } catch (err) {
          showToast('⚠️ Gagal update: ' + err.message);
        }
      });
    });

    // Hapus
    container.querySelectorAll('.btn-del').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Hapus karya ini?')) return;
        const id = btn.dataset.id;
        try {
          await deleteDoc(doc(db, 'karya', id));
          showToast('🗑️ Dihapus');
        } catch (err) {
          showToast('⚠️ Gagal hapus: ' + err.message);
        }
      });
    });
  }

  // ===== START =====
  listenKarya();
  console.log('🏁 Aplikasi siap');

  // Opsional: FAB saran (bisa ditambahkan jika mau)
</script>
</body>
</html>
