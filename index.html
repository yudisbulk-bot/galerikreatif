<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🎨 Galeri Kreatif</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
    body { background:#f8f6f2; padding:16px; min-height:100vh; }
    .container { max-width:700px; margin:0 auto; }
    .header { text-align:center; padding:24px 0 16px; }
    .header h1 { font-size:32px; font-weight:800; color:#1a1a1a; letter-spacing:-0.5px; }
    .header p { color:#888; font-size:15px; margin-top:4px; }
    .admin-badge { display:inline-block; background:#1a1a1a; color:white; padding:6px 16px; border-radius:40px; font-size:12px; font-weight:600; margin-top:8px; }
    .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; margin-top:20px; }
    .gallery-card { background:white; border-radius:20px; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,0.06); cursor:pointer; transition:all 0.25s ease; border:2px solid transparent; position:relative; }
    .gallery-card:active { transform:scale(0.97); border-color:#1a1a1a; }
    .gallery-card img { width:100%; height:180px; object-fit:cover; display:block; background:#f0ede8; }
    .gallery-card .card-title { padding:12px 14px 10px; font-weight:700; font-size:15px; color:#1a1a1a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gallery-card .card-badge { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); color:white; font-size:11px; padding:4px 12px; border-radius:30px; font-weight:500; }
    .empty-state { text-align:center; padding:60px 20px; color:#bbb; grid-column:1/-1; }
    .empty-state span { font-size:48px; display:block; margin-bottom:12px; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); display:none; justify-content:center; align-items:center; padding:20px; z-index:1000; animation:fadeIn 0.25s ease; }
    .modal-overlay.active { display:flex; }
    .modal-box { background:white; border-radius:28px; max-width:480px; width:100%; max-height:90vh; overflow-y:auto; padding:0; box-shadow:0 24px 64px rgba(0,0,0,0.2); animation:slideUp 0.3s ease; }
    .modal-box img { width:100%; height:auto; max-height:50vh; object-fit:contain; background:#f5f3f0; border-radius:28px 28px 0 0; }
    .modal-content { padding:24px 24px 28px; }
    .modal-content h2 { font-size:22px; font-weight:700; color:#1a1a1a; margin-bottom:8px; }
    .modal-content .desc-label { font-size:12px; font-weight:600; color:#999; text-transform:uppercase; letter-spacing:0.5px; margin-top:12px; display:block; }
    .modal-content .description { font-size:16px; line-height:1.6; color:#333; background:#f8f6f2; padding:14px 16px; border-radius:14px; margin-top:6px; white-space:pre-wrap; word-break:break-word; min-height:40px; }
    .modal-close { display:block; width:100%; padding:14px; margin-top:16px; background:#1a1a1a; color:white; border:none; border-radius:40px; font-size:16px; font-weight:600; cursor:pointer; transition:0.2s; }
    .modal-close:active { transform:scale(0.97); }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .footer { text-align:center; color:#ccc; font-size:13px; margin-top:40px; padding-bottom:10px; }
    .footer a { color:#888; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🎨 Galeri Kreatif</h1>
    <p>Klik karya untuk baca ceritanya</p>
    <div class="admin-badge">👀 Mode Pengunjung</div>
  </div>

  <div id="galleryContainer" class="gallery">
    <div class="empty-state"><span>🖼️</span>Belum ada karya<br><small style="color:#ddd;">Admin belum mengisi</small></div>
  </div>

  <div class="footer"><a href="admin.html">🔐 Mode Admin</a> • Data di HP kamu</div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <img id="modalImage" src="" alt="Karya">
    <div class="modal-content">
      <h2 id="modalTitle">Judul</h2>
      <span class="desc-label">📖 Deskripsi</span>
      <div class="description" id="modalDesc">Deskripsi karya...</div>
      <button class="modal-close" id="closeModalBtn">Tutup</button>
    </div>
  </div>
</div>

<script>
  let galleryData = [];
  function loadData() {
    const stored = localStorage.getItem('portfolioData');
    if (stored) {
      try { galleryData = JSON.parse(stored).gallery || []; } catch(e) { galleryData = []; }
    } else { galleryData = []; }
    renderGallery();
  }

  function renderGallery() {
    const container = document.getElementById('galleryContainer');
    if (galleryData.length === 0) {
      container.innerHTML = `<div class="empty-state"><span>🖼️</span>Belum ada karya<br><small style="color:#ddd;">Admin belum mengisi</small></div>`;
      return;
    }
    let html = '';
    galleryData.forEach((item, index) => {
      const hasDesc = item.description && item.description.trim().length > 0;
      html += `<div class="gallery-card" data-index="${index}">
        <img src="${item.src}" alt="${item.caption || 'Karya'}" loading="lazy">
        <div class="card-title">${item.caption || 'Karya'}</div>
        ${hasDesc ? '<div class="card-badge">📖</div>' : ''}
      </div>`;
    });
    container.innerHTML = html;
    document.querySelectorAll('.gallery-card').forEach(card => {
      card.addEventListener('click', () => {
        const idx = parseInt(card.dataset.index);
        const item = galleryData[idx];
        if (!item) return;
        document.getElementById('modalImage').src = item.src;
        document.getElementById('modalTitle').textContent = item.caption || 'Karya';
        document.getElementById('modalDesc').textContent = item.description || 'Tidak ada deskripsi.';
        document.getElementById('detailModal').classList.add('active');
        document.body.style.overflow = 'hidden';
      });
    });
  }

  function closeModal() {
    document.getElementById('detailModal').classList.remove('active');
    document.body.style.overflow = '';
  }
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('detailModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  loadData();
  setInterval(loadData, 3000);
</script>
</body>
</html>
